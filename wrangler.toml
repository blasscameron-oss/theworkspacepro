name = "twp-monitor"
main = "worker/monitor.js"
compatibility_date = "2026-06-01"

# Run every Monday at 14:00 UTC (8:00 AM CST / 9:00 AM CDT)
[triggers]
crons = ["0 14 * * 1"]

# KV namespace for storing check results
[[kv_namespaces]]
binding = "TWP_MONITOR"
id = "54ef76b2a6304fbb80f34053827df506"

[vars]
SITE_URL = "https://www.theworkspacepro.com"
ALERT_EMAIL = ""

# Optional auth for manual HTTP health checks:
#   npx wrangler secret put MONITOR_SECRET
# Then run a check with the X-Monitor-Key request header.
# GET /?action=latest uses the same X-Monitor-Key authentication.
