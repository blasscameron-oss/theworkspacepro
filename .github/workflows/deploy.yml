name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

concurrency:
  group: theworkspacepro-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Validate public source
        run: |
          find assets/js worker -name '*.js' -print0 | xargs -0 -n1 node --check
          if grep -R -n -E --exclude-dir=.git --exclude-dir=dist --exclude-dir=_site --include="*.html" 'function getBadgeColumnForRow|newsletter-bar",000|data-cf-beacon="\{"' .; then
            echo "Generated-site corruption signature found"
            exit 1
          fi
          if grep -R -n -P -z --exclude-dir=.git --exclude-dir=dist --exclude-dir=_site --include="*.html" '<meta name="description"[^>]*"\s*\n' .; then
            echo "Malformed HTML head signature found"
            exit 1
          fi

      - name: Build component-based public artifact
        run: npm run build

      - name: Check types and content contracts
        run: npm run check

      - name: Validate built public artifact
        run: node scripts/validate-public-site.mjs dist
      - name: Run release contract tests
        run: node --test tests/*.test.mjs


      - name: Install browser for release checks
        run: npx playwright install --with-deps chromium

      - name: Run desktop and mobile release flows
        run: npm run test:e2e

      - name: Generate release metadata
        run: |
          echo '{"sha":"${{ github.sha }}","ref":"${{ github.ref }}","run":"${{ github.run_id }}","ts":"$(date -u +%Y-%m-%dT%H:%M:%SZ)"}' > dist/release.json
          echo '<meta name="twp-release" content="${{ github.sha }}">' >> dist/index.html

      - name: Harden — verify latest-main SHA before deploy
        run: |
          LATEST=$(git ls-remote origin main | cut -f1)
          if [ "$LATEST" != "${{ github.sha }}" ]; then
            echo "ABORT: HEAD ${{ github.sha }} !== origin/main $LATEST — superseded run"
            exit 1
          fi

      - name: Deploy to Cloudflare Pages production
        id: pages_deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy dist
            --project-name=the-workspace-pro
            --branch=main
            --commit-hash=${{ github.sha }}
            --commit-dirty=false

      - name: Smoke test — unique deployment URL
        run: |
          UNIQUE_URL=$(echo '${{ steps.pages_deploy.outputs.deployment-url }}' || true)
          if [ -z "$UNIQUE_URL" ]; then
            echo "ERROR: no deployment URL captured"
            exit 1
          fi
          echo "Deployed to: $UNIQUE_URL"
          for path in / /guides /deals /compare/ /tools; do
            STATUS=$(curl -fsSIL -o /dev/null -w '%{http_code}' --http1.1 "${UNIQUE_URL}${path}")
            echo "  $path → $STATUS"
            if [ "$STATUS" != "200" ]; then echo "FAIL $path"; exit 1; fi
          done

      - name: Deploy health monitor Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.toml

      - name: Run authenticated health check
        env:
          MONITOR_SECRET: ${{ secrets.MONITOR_SECRET }}
        run: |
          curl --fail-with-body --silent --show-error --retry 5 --retry-delay 3 --retry-all-errors --max-time 180 \
            --header "X-Monitor-Key: $MONITOR_SECRET" \
            --output monitor-result.json \
            https://twp-monitor.blasscameron.workers.dev
          node -e "const r=require('./monitor-result.json'); if(r.failed!==0) { console.error(r); process.exit(1) }"
